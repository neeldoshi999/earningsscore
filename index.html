<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;color:var(--color-text-primary,#1a1a1a);background:transparent}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0);flex-wrap:wrap;gap:8px}
.title{font-size:16px;font-weight:500}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
select{padding:5px 8px;border:0.5px solid var(--color-border-secondary,#bbb);border-radius:6px;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a1a);font-size:13px;cursor:pointer}
.unit-btns{display:flex;gap:0;border:0.5px solid var(--color-border-secondary,#bbb);border-radius:6px;overflow:hidden}
.unit-btn{padding:5px 12px;font-size:12px;cursor:pointer;border:none;background:var(--color-background-secondary,#f5f5f5);color:var(--color-text-secondary,#666)}
.unit-btn.active{background:var(--color-text-primary,#1a1a1a);color:var(--color-background-primary,#fff)}
.threshold-row{display:flex;align-items:center;gap:8px;padding:6px 16px;font-size:12px;color:var(--color-text-secondary,#666);background:var(--color-background-secondary,#f5f5f5);border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0);flex-wrap:wrap}
.threshold-row input[type=number]{width:55px;padding:3px 6px;font-size:12px;border:0.5px solid var(--color-border-secondary,#bbb);border-radius:4px;text-align:center;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a1a)}
.upload-bar{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0);flex-wrap:wrap}
.upload-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;font-size:12px;border:0.5px solid var(--color-border-secondary,#bbb);border-radius:6px;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a1a);cursor:pointer;white-space:nowrap}
.upload-btn:hover{background:var(--color-background-secondary,#f5f5f5)}
.upload-btn svg{flex-shrink:0}
#pdfFileInput{display:none}
.status-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500}
.status-idle{background:var(--color-background-secondary,#f5f5f5);color:var(--color-text-secondary,#666)}
.status-loading{background:#E6F1FB;color:#185FA5}
.status-done{background:#EAF3DE;color:#3B6D11}
.status-err{background:#FCEBEB;color:#A32D2D}
.spinner{width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.extracted-preview{margin:0 16px 8px;padding:10px 12px;border:0.5px solid var(--color-border-secondary,#bbb);border-radius:8px;font-size:12px;background:var(--color-background-secondary,#f5f5f5);display:none}
.extracted-preview h4{font-size:12px;font-weight:500;margin-bottom:6px;color:var(--color-text-secondary,#666)}
.extracted-preview .ext-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0)}
.extracted-preview .ext-row:last-child{border-bottom:none}
.ext-match{color:#1D9E75;font-size:11px}
.ext-nomatch{color:#888;font-size:11px}
.apply-btn{padding:5px 14px;font-size:12px;border:none;border-radius:6px;background:#1D9E75;color:#fff;cursor:pointer;margin-top:8px}
.apply-btn:hover{background:#0F6E56}
.table-wrap{overflow-x:auto;padding:0 0 8px}
table{width:100%;border-collapse:collapse;min-width:640px}
thead th{padding:8px 10px;font-size:11px;font-weight:500;color:var(--color-text-secondary,#666);text-align:right;border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0);white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
thead th:first-child{text-align:left}
tbody tr{border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0)}
tbody tr:hover{background:var(--color-background-secondary,#f9f9f9)}
td{padding:8px 10px;text-align:right;font-size:13px;vertical-align:middle}
td:first-child{text-align:left}
.metric{font-weight:500}
.est{color:var(--color-text-secondary,#666)}
.actual-input{width:90px;padding:4px 6px;border:0.5px solid var(--color-border-secondary,#bbb);border-radius:4px;font-size:13px;text-align:right;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a1a)}
.actual-input:focus{outline:none;border-color:#378ADD}
.actual-input.has-val{border-color:#1D9E75}
.actual-input.ai-filled{border-color:#8B7FDD;background:#EEEDFE22}
.devpct{font-weight:500;font-size:13px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap}
.beat{background:#EAF3DE;color:#3B6D11}
.inline{background:#FAEEDA;color:#854F0B}
.miss{background:#FCEBEB;color:#A32D2D}
.na{color:var(--color-text-tertiary,#aaa);font-size:12px}
.add-btn{margin:8px 16px;padding:5px 12px;font-size:12px;border:0.5px dashed var(--color-border-secondary,#bbb);border-radius:6px;background:transparent;color:var(--color-text-secondary,#666);cursor:pointer}
.add-btn:hover{background:var(--color-background-secondary,#f5f5f5)}
.qtr-badge{display:inline-block;font-size:11px;padding:2px 8px;background:#E6F1FB;color:#185FA5;border-radius:4px;font-weight:500}
.ai-dot{width:8px;height:8px;border-radius:50%;background:#534AB7;display:inline-block;flex-shrink:0}
@media(prefers-color-scheme:dark){
  .beat{background:#173404;color:#C0DD97}
  .inline{background:#412402;color:#FAC775}
  .miss{background:#501313;color:#F7C1C1}
  .actual-input.ai-filled{background:#26215C44}
}
</style>
</head>
<body>

<div class="hdr">
  <div style="display:flex;align-items:center;gap:10px">
    <span class="title">Q4FY26 Earnings Scorecard</span>
    <span class="qtr-badge">Jan–Mar 2026</span>
  </div>
  <div class="controls">
    <select id="sectorSel" onchange="loadSector()"></select>
    <select id="companySel" onchange="loadCompany()"></select>
    <div class="unit-btns">
      <button class="unit-btn active" onclick="setUnit('Mn',this)">₹ Mn</button>
      <button class="unit-btn" onclick="setUnit('Bn',this)">₹ Bn</button>
      <button class="unit-btn" onclick="setUnit('Cr',this)">₹ Cr</button>
    </div>
  </div>
</div>

<div class="threshold-row">
  Beat &gt; <input type="number" id="beatThr" value="2" min="0" max="20" step="0.5" oninput="recalcAll()">%
  &nbsp;|&nbsp; Miss &lt; −<input type="number" id="missThr" value="2" min="0" max="20" step="0.5" oninput="recalcAll()">%
  <span style="margin-left:auto;font-size:11px;color:var(--color-text-tertiary,#aaa)">Upload results PDF to auto-fill actuals</span>
</div>

<div class="upload-bar">
  <label class="upload-btn" for="pdfFileInput">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1v9M5 4l3-3 3 3M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Upload Results PDF
  </label>
  <input type="file" id="pdfFileInput" accept=".pdf" onchange="handlePDF(this)">
  <div id="statusPill" class="status-pill status-idle">No file uploaded</div>
  <span style="font-size:11px;color:var(--color-text-tertiary,#aaa);margin-left:auto">
    <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#534AB7;margin-right:4px"></span>Purple border = AI-filled
  </span>
</div>

<div class="extracted-preview" id="extractedPreview">
  <h4>Extracted from PDF — review before applying</h4>
  <div id="previewRows"></div>
  <div style="display:flex;gap:8px;margin-top:8px">
    <button class="apply-btn" onclick="applyExtracted()">Apply to scorecard</button>
    <button style="padding:5px 14px;font-size:12px;border:0.5px solid var(--color-border-secondary,#bbb);border-radius:6px;background:transparent;color:var(--color-text-secondary,#666);cursor:pointer" onclick="dismissPreview()">Dismiss</button>
  </div>
</div>

<div class="table-wrap">
  <table id="mainTable">
    <thead>
      <tr>
        <th style="text-align:left;min-width:150px">Metric</th>
        <th>Actual</th>
        <th>Estimate</th>
        <th>% Dev</th>
        <th>Result</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>
<button class="add-btn" onclick="addRow()">+ Add metric</button>

function setStatus(msg, type){

  p.className = 'status-pill status-'+type;

}

}

function loadSector(){

}

function loadCompany(){
  const sector=document.getElementById('sectorSel').value;

function setUnit(u,btn){
  unit=u;
  document.querySelectorAll('.unit-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function getConvFactor(mu){
  if(mu==='%'||mu==='spec') return 1;
  if(unit==='Mn') return 1;
  if(unit==='Bn') return 0.001;
  if(unit==='Cr') return 0.1;
  return 1;
}

function getUnitLabel(mu){
  if(mu==='%') return '%';
  if(mu==='spec') return '';
  return '₹ '+unit;
}

function fmtVal(v,mu){
  if(v===null||v===undefined||v==='') return '—';
  const f=getConvFactor(mu), n=parseFloat(v)*f;
  if(mu==='%') return parseFloat(v).toFixed(2)+'%';
  if(mu==='spec') return parseFloat(v).toLocaleString('en-IN',{maximumFractionDigits:2});
  if(Math.abs(n)>=10000) return n.toLocaleString('en-IN',{maximumFractionDigits:0});
  if(Math.abs(n)>=100) return n.toLocaleString('en-IN',{maximumFractionDigits:1});
  return n.toFixed(2);
}

function getBeat(){return parseFloat(document.getElementById('beatThr').value)||2;}
function getMiss(){return parseFloat(document.getElementById('missThr').value)||2;}

function toBaseMn(v, mu){
  if(mu==='%'||mu==='spec') return parseFloat(v);
  const n = parseFloat(v);
  if(unit==='Mn') return n;
  if(unit==='Bn') return n*1000;
  if(unit==='Cr') return n*10;
  return n;
}

function calcDev(est,actual,mu){
  if(mu==='%'){
    const a=parseFloat(actual), e=parseFloat(est);
    if(isNaN(a)||isNaN(e)) return null;
    return a-e;
  }
  const aBase=toBaseMn(actual,mu);
  const eBase=parseFloat(est);
  if(isNaN(aBase)||isNaN(eBase)||eBase===0) return null;
  return ((aBase-eBase)/Math.abs(eBase))*100;
}

function getBadge(dev,mu){
  if(dev===null) return '<span class="na">—</span>';
  const beat=getBeat(),miss=getMiss();
  const thr = mu==='%' ? beat/10 : beat;
  const mth = mu==='%' ? miss/10 : miss;
  if(dev>thr) return '<span class="badge beat">Beat</span>';
  if(dev<-mth) return '<span class="badge miss">Miss</span>';
  return '<span class="badge inline">In-line</span>';
}

function renderTable(){
  const tbody=document.getElementById('tableBody');
  const allRows=[...currentMetrics,...customRows];
  if(!allRows.length){tbody.innerHTML='<tr><td colspan="5" style="padding:40px;text-align:center;color:var(--color-text-secondary,#888)">No metrics loaded</td></tr>';return;}
  let html='';
  allRows.forEach((row,i)=>{
    const actual=actuals[i]||'';
    const dev=actual!==''?calcDev(row.e,actual,row.u):null;
    const devStr=dev!==null?(dev>=0?'+':'')+dev.toFixed(2)+(row.u==='%'?' pp':'%'):'—';
    const devColor=dev!==null?(dev>getBeat()?'#1D9E75':dev<-getMiss()?'#D85A30':'#BA7517'):'inherit';
    const badge=actual!==''?getBadge(dev,row.u):'<span class="na">—</span>';
    const ulbl=row.u==='spec'?(row.spec||''):getUnitLabel(row.u);
    const aiClass=aiFilled[i]?' ai-filled':'';
    html+=`<tr>
      <td><span class="metric">${row.m}</span>${ulbl?`<span style="font-size:11px;color:var(--color-text-secondary,#888);margin-left:4px">(${ulbl})</span>`:''}
      ${aiFilled[i]?'<span style="font-size:10px;color:#534AB7;margin-left:4px">AI</span>':''}</td>
      <td><input class="actual-input${actual?' has-val':''}${aiClass}" id="inp_${i}" type="number" value="${actual}" placeholder="Enter" step="any" onchange="setActual(${i},this.value)" oninput="setActual(${i},this.value)" style="width:90px"></td>
      <td class="est">${fmtVal(row.e,row.u)}</td>
      <td class="devpct" style="color:${devColor}">${devStr}</td>
      <td>${badge}</td>
    </tr>`;
  });
  tbody.innerHTML=html;
}

function setActual(idx,val){
  actuals[idx]=val;
  aiFilled[idx]=false;
  const allRows=[...currentMetrics,...customRows];
  const row=allRows[idx];
  const inp=document.getElementById('inp_'+idx);
  if(!inp) return;
  inp.classList.toggle('has-val',val!=='');
  inp.classList.remove('ai-filled');
  const tr=inp.closest('tr');
  const dev=val!==''?calcDev(row.e,val,row.u):null;
  const devStr=dev!==null?(dev>=0?'+':'')+dev.toFixed(2)+(row.u==='%'?' pp':'%'):'—';
  const devColor=dev!==null?(dev>getBeat()?'#1D9E75':dev<-getMiss()?'#D85A30':'#BA7517'):'inherit';
  tr.children[3].textContent=devStr;
  tr.children[3].style.color=devColor;
  tr.children[4].innerHTML=val!==''?getBadge(dev,row.u):'<span class="na">—</span>';
}

function recalcAll(){renderTable();}

function addRow(){
  const name=prompt('Metric name (e.g. EBITDA/ton, NIM, Revenue):');
  if(!name) return;
  const uc=prompt('Unit:\n1 = ₹ Amount (follows Mn/Bn/Cr toggle)\n2 = % or ratio\n3 = Custom label\nEnter 1, 2, or 3:');
  let u='Mn',spec='';
  if(uc==='2') u='%';
  else if(uc==='3'){spec=prompt('Enter unit label:')||'';u='spec';}
  const ev=prompt('Enter estimate value:');
  if(ev===null) return;
  customRows.push({m:name,e:parseFloat(ev)||0,u,spec});
  renderTable();
}

async function extractTextFromPDF(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let text='';
  for(let i=1;i<=Math.min(pdf.numPages,15);i++){
    const page=await pdf.getPage(i);
    const content=await page.getTextContent();
    text+=content.items.map(it=>it.str).join(' ')+'\n';
  }
  return text;
}

function buildPrompt(pdfText, company, metrics){
  const metricList = metrics.map((m,i)=>`${i}: "${m.m}" in ${m.u==='%'?'percentage (e.g. 3.54 for 3.54%)':m.u==='spec'?(m.spec||'original unit'):'₹ Millions (crores × 10 or lakhs ÷ 10)'}`).join('\n');
  return `Extract Q4FY26 (January-March 2026) actual reported financials for ${company} from the text below.

Metrics needed (index: name, unit):
${metricList}

The document may report numbers in Crores (Cr), Lakhs, Millions or Billions. Convert everything to the unit specified above.
Conversion: 1 Cr = 10 Mn. 1 Bn = 1000 Mn. 1 Lakh = 0.1 Mn.

Rules:
- Output ONLY raw JSON, nothing else. No words before or after. No markdown. No explanation.
- Use metric index as key (string), actual value as number.
- Skip any metric not clearly found.
- Use Q4FY26 / Q4 FY2026 / Jan-Mar 2026 figures only, not full year or prior quarters.
- For % metrics (NIM, GNPA, margins) output the percentage number directly (e.g. 3.54, not 0.0354).

Example output format (do not copy these values):
{"0":344500,"1":296000,"2":202100,"4":3.56,"5":1.18}

TEXT:
${pdfText.substring(0,14000)}`;
}

async function handlePDF(input){
  const file=input.files[0];
  if(!file) return;
  setStatus('Reading PDF...','loading');
  dismissPreview();
  try{
    const text=await extractTextFromPDF(file);
    if(text.trim().length<100){
      setStatus('PDF appears to be image-based (no text found)','err');
      return;
    }
    setStatus('Extracting numbers with AI...','loading');
    const company=document.getElementById('companySel').value;
    const allRows=[...currentMetrics,...customRows];
    const prompt=buildPrompt(text,company,allRows);
    const headers = {'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'};
    if(ANTHROPIC_API_KEY) headers['x-api-key'] = ANTHROPIC_API_KEY;
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers,
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    if(!resp.ok){
      const errText=await resp.text();
      setStatus('API error '+resp.status+': '+errText.slice(0,120),'err');
      return;
    }
    const data=await resp.json();
    const raw=data.content?.[0]?.text||'{}';
    let extracted={};
    try{
      const jsonMatch = raw.match(/\{[\s\S]*\}/);
      if(!jsonMatch) throw new Error('No JSON found');
      extracted=JSON.parse(jsonMatch[0]);
    }catch(e){
      setStatus('Parse error — raw: '+raw.slice(0,120),'err');
      return;
    }
    const keys=Object.keys(extracted);
    if(!keys.length){
      setStatus('No matching metrics found in PDF','err');
      return;
    }
    pendingExtracted=extracted;
    showPreview(extracted,allRows,file.name);
    setStatus(`Found ${keys.length} metric${keys.length>1?'s':''} — review below`,'done');
  }catch(e){
    console.error(e);
    setStatus('Error: '+e.message,'err');
  }
  input.value='';
}

function showPreview(extracted,allRows,fname){
  const preview=document.getElementById('extractedPreview');
  const rows=document.getElementById('previewRows');
  preview.style.display='block';
  let html=`<div style="font-size:11px;color:var(--color-text-secondary,#666);margin-bottom:8px">From: <b>${fname}</b></div>`;
  Object.entries(extracted).forEach(([idx,val])=>{
    const row=allRows[parseInt(idx)];
    if(!row) return;
    const ulbl=row.u==='%'?'%':row.u==='spec'?(row.spec||''):'₹ Mn';
    html+=`<div class="ext-row">
      <span style="font-weight:500">${row.m}</span>
      <span>
        <span style="color:var(--color-text-secondary,#666);font-size:11px;margin-right:8px">Est: ${fmtVal(row.e,row.u)}</span>
        <span style="font-weight:500">${val} ${ulbl}</span>
        <span class="ext-match" style="margin-left:6px">✓ matched</span>
      </span>
    </div>`;
  });
  rows.innerHTML=html;
}

function applyExtracted(){
  const allRows=[...currentMetrics,...customRows];
  Object.entries(pendingExtracted).forEach(([idx,val])=>{
    const i=parseInt(idx);
    if(allRows[i]){
      actuals[i]=val;
      aiFilled[i]=true;
    }
  });
  pendingExtracted={};
  dismissPreview();
  renderTable();
  setStatus('Applied — purple borders indicate AI-filled values','done');
}

function dismissPreview(){
  document.getElementById('extractedPreview').style.display='none';
  document.getElementById('previewRows').innerHTML='';
  pendingExtracted={};
}
