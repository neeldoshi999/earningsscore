<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:14px;color:var(--color-text-primary,#1a1a1a);background:var(--color-background-tertiary,#f5f5f3);min-height:100vh}

/* ── top bar ── */
.topbar{background:var(--color-background-primary,#fff);border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;position:sticky;top:0;z-index:10}
.topbar-title{font-size:15px;font-weight:500;white-space:nowrap}
.qtr-badge{font-size:11px;padding:2px 8px;background:#E6F1FB;color:#185FA5;border-radius:4px;font-weight:500;white-space:nowrap}

/* ── selectors row ── */
.selectors{background:var(--color-background-primary,#fff);padding:10px 16px;display:flex;gap:8px;border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0);flex-wrap:wrap}
select{flex:1;min-width:130px;padding:8px 10px;border:0.5px solid var(--color-border-secondary,#bbb);border-radius:8px;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a1a);font-size:13px;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23888' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;padding-right:28px}

/* ── toolbar ── */
.toolbar{background:var(--color-background-primary,#fff);padding:8px 16px;display:flex;align-items:center;gap:8px;border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0);flex-wrap:wrap}
.unit-btns{display:flex;border:0.5px solid var(--color-border-secondary,#bbb);border-radius:8px;overflow:hidden}
.unit-btn{padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:var(--color-background-secondary,#f5f5f5);color:var(--color-text-secondary,#666);transition:background .15s,color .15s;white-space:nowrap}
.unit-btn.active{background:var(--color-text-primary,#1a1a1a);color:#fff}
.thr-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--color-text-secondary,#666);flex-wrap:wrap}
.thr-row input{width:44px;padding:4px 6px;font-size:12px;border:0.5px solid var(--color-border-secondary,#bbb);border-radius:6px;text-align:center;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a1a)}

/* ── upload bar ── */
.upload-bar{background:var(--color-background-primary,#fff);padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0);flex-wrap:wrap}
.upload-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;font-size:13px;border:0.5px solid var(--color-border-secondary,#bbb);border-radius:8px;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a1a);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.upload-btn:active{background:var(--color-background-secondary,#f5f5f5)}
#pdfFileInput{display:none}
.status-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:20px;font-size:12px;font-weight:500;flex-shrink:0}
.status-idle{background:var(--color-background-secondary,#f5f5f5);color:var(--color-text-secondary,#666)}
.status-loading{background:#E6F1FB;color:#185FA5}
.status-done{background:#EAF3DE;color:#3B6D11}
.status-err{background:#FCEBEB;color:#A32D2D}
.spinner{width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── extracted preview ── */
.ext-preview{margin:12px 16px;padding:12px;border:0.5px solid var(--color-border-secondary,#bbb);border-radius:10px;font-size:13px;background:var(--color-background-primary,#fff);display:none}
.ext-preview h4{font-size:12px;font-weight:500;margin-bottom:8px;color:var(--color-text-secondary,#666)}
.ext-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0);gap:8px;flex-wrap:wrap}
.ext-row:last-child{border-bottom:none}
.ext-match{color:#1D9E75;font-size:11px;white-space:nowrap}
.btn-apply{padding:8px 16px;font-size:13px;border:none;border-radius:8px;background:#1D9E75;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-apply:active{background:#0F6E56}
.btn-dismiss{padding:8px 16px;font-size:13px;border:0.5px solid var(--color-border-secondary,#bbb);border-radius:8px;background:transparent;color:var(--color-text-secondary,#666);cursor:pointer}

/* ── CARDS layout (mobile) ── */
.cards-wrap{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.metric-card{background:var(--color-background-primary,#fff);border-radius:12px;border:0.5px solid var(--color-border-tertiary,#e0e0e0);padding:12px 14px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.card-metric{font-weight:500;font-size:14px;flex:1}
.card-unit{font-size:11px;color:var(--color-text-secondary,#666);margin-left:4px}
.card-ai{font-size:10px;color:#534AB7;margin-left:4px}
.card-body{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card-field{display:flex;flex-direction:column;gap:4px}
.card-label{font-size:11px;color:var(--color-text-secondary,#666);text-transform:uppercase;letter-spacing:.4px}
.card-est{font-size:15px;font-weight:500;color:var(--color-text-primary,#1a1a1a)}
.actual-input{width:100%;padding:8px 10px;border:0.5px solid var(--color-border-secondary,#bbb);border-radius:8px;font-size:15px;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a1a);-webkit-appearance:none;-moz-appearance:textfield}
.actual-input::-webkit-outer-spin-button,.actual-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.actual-input:focus{outline:none;border-color:#378ADD;border-width:1.5px}
.actual-input.has-val{border-color:#1D9E75}
.actual-input.ai-filled{border-color:#8B7FDD;background:#EEEDFE22}
.card-footer{margin-top:10px;display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:0.5px solid var(--color-border-tertiary,#e0e0e0)}
.devpct{font-weight:500;font-size:14px}
.badge{display:inline-block;padding:3px 10px;border-radius:5px;font-size:12px;font-weight:500}
.beat{background:#EAF3DE;color:#3B6D11}
.inline-b{background:#FAEEDA;color:#854F0B}
.miss{background:#FCEBEB;color:#A32D2D}
.na{color:var(--color-text-tertiary,#aaa);font-size:12px}

/* ── TABLE layout (tablet+) ── */
.table-wrap{display:none;overflow-x:auto;padding:12px 16px}
table{width:100%;border-collapse:collapse;background:var(--color-background-primary,#fff);border-radius:12px;overflow:hidden;border:0.5px solid var(--color-border-tertiary,#e0e0e0)}
thead th{padding:10px 12px;font-size:11px;font-weight:500;color:var(--color-text-secondary,#666);text-align:right;background:var(--color-background-secondary,#f9f9f7);border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0);white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
thead th:first-child{text-align:left}
tbody tr{border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--color-background-secondary,#f9f9f7)}
td{padding:10px 12px;text-align:right;font-size:13px;vertical-align:middle}
td:first-child{text-align:left}
.tbl-metric{font-weight:500}
.tbl-est{color:var(--color-text-secondary,#666)}
.tbl-input{width:100px;padding:5px 8px;border:0.5px solid var(--color-border-secondary,#bbb);border-radius:6px;font-size:13px;text-align:right;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a1a);-moz-appearance:textfield}
.tbl-input::-webkit-outer-spin-button,.tbl-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.tbl-input:focus{outline:none;border-color:#378ADD}
.tbl-input.has-val{border-color:#1D9E75}
.tbl-input.ai-filled{border-color:#8B7FDD;background:#EEEDFE22}

/* ── add btn ── */
.add-btn{display:block;margin:4px 16px 16px;padding:10px;font-size:13px;border:0.5px dashed var(--color-border-secondary,#bbb);border-radius:10px;background:transparent;color:var(--color-text-secondary,#666);cursor:pointer;width:calc(100% - 32px);text-align:center;-webkit-tap-highlight-color:transparent}
.add-btn:active{background:var(--color-background-secondary,#f5f5f5)}

/* ── responsive breakpoints ── */
@media(min-width:680px){
  .cards-wrap{display:none}
  .table-wrap{display:block}
  .topbar-title{font-size:16px}
  .toolbar{flex-wrap:nowrap}
  .add-btn{width:auto;display:inline-block}
}
@media(min-width:680px) and (max-width:900px){
  .selectors{flex-wrap:nowrap}
}

@media(prefers-color-scheme:dark){
  .beat{background:#173404;color:#C0DD97}
  .inline-b{background:#412402;color:#FAC775}
  .miss{background:#501313;color:#F7C1C1}
  .actual-input.ai-filled,.tbl-input.ai-filled{background:#26215C44}
}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:8px">
    <span class="topbar-title">Q4FY26 Scorecard</span>
    <span class="qtr-badge">Jan–Mar 2026</span>
  </div>
  <div class="unit-btns">
    <button class="unit-btn active" onclick="setUnit('Mn',this)">₹ Mn</button>
    <button class="unit-btn" onclick="setUnit('Bn',this)">₹ Bn</button>
    <button class="unit-btn" onclick="setUnit('Cr',this)">₹ Cr</button>
  </div>
</div>

<div class="selectors">
  <select id="sectorSel" onchange="loadSector()"></select>
  <select id="companySel" onchange="loadCompany()"></select>
</div>

<div class="toolbar">
  <div class="thr-row">
    <span>Beat &gt;</span>
    <input type="number" id="beatThr" value="2" min="0" max="20" step="0.5" oninput="recalcAll()">
    <span>% &nbsp;|&nbsp; Miss &lt; −</span>
    <input type="number" id="missThr" value="2" min="0" max="20" step="0.5" oninput="recalcAll()">
    <span>%</span>
  </div>
</div>

<div class="upload-bar">
  <label class="upload-btn" for="pdfFileInput">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1v9M5 4l3-3 3 3M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Upload Results PDF
  </label>
  <input type="file" id="pdfFileInput" accept=".pdf" onchange="handlePDF(this)">
  <div id="statusPill" class="status-pill status-idle">No file uploaded</div>
</div>

<div class="ext-preview" id="extPreview">
  <h4>Extracted from PDF — review before applying</h4>
  <div id="previewRows"></div>
  <div style="display:flex;gap:8px;margin-top:10px">
    <button class="btn-apply" onclick="applyExtracted()">Apply to scorecard</button>
    <button class="btn-dismiss" onclick="dismissPreview()">Dismiss</button>
  </div>
</div>

<!-- Mobile: cards -->
<div class="cards-wrap" id="cardsWrap"></div>

<!-- Tablet+: table -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="text-align:left;min-width:150px">Metric</th>
        <th>Actual</th>
        <th>Estimate</th>
        <th>% Dev</th>
        <th>Result</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<button class="add-btn" onclick="addRow()">+ Add metric</button>

let unit='Mn',currentMetrics=[],actuals={},customRows=[],aiFilled={},pendingExtracted={};

function setStatus(msg,type){
  const p=document.getElementById('statusPill');
  p.className='status-pill status-'+type;
  p.innerHTML=(type==='loading'?'<div class="spinner"></div>':'')+msg;
}

function populateSectors(){
  const s=document.getElementById('sectorSel');
  Object.keys(RAW).forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=k;s.appendChild(o);});
  loadSector();
}

function loadSector(){
  const sector=document.getElementById('sectorSel').value;
  const cs=document.getElementById('companySel');
  cs.innerHTML='';
  Object.keys(RAW[sector]).forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=k;cs.appendChild(o);});
  actuals={};customRows={};aiFilled={};
  dismissPreview();
  loadCompany();
}

function loadCompany(){
  const sector=document.getElementById('sectorSel').value;
  const company=document.getElementById('companySel').value;
  currentMetrics=JSON.parse(JSON.stringify(RAW[sector][company]));
  actuals={};customRows=[];aiFilled={};
  dismissPreview();
  render();
}

function setUnit(u,btn){
  unit=u;
  document.querySelectorAll('.unit-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function toBaseMn(v,mu){
  if(mu==='%'||mu==='spec') return parseFloat(v);
  const n=parseFloat(v);
  if(unit==='Mn') return n;
  if(unit==='Bn') return n*1000;
  if(unit==='Cr') return n*10;
  return n;
}

function getDisplayVal(estMn,mu){
  if(mu==='%'||mu==='spec') return estMn;
  if(unit==='Mn') return estMn;
  if(unit==='Bn') return estMn/1000;
  if(unit==='Cr') return estMn/10;
  return estMn;
}

function getUnitLabel(mu){
  if(mu==='%') return '%';
  if(mu==='spec') return '';
  return '₹ '+unit;
}

function fmtVal(v,mu){
  if(v===null||v===undefined||v==='') return '—';
  const n=getDisplayVal(parseFloat(v),mu);
  if(mu==='%') return parseFloat(v).toFixed(2)+'%';
  if(mu==='spec') return parseFloat(v).toLocaleString('en-IN',{maximumFractionDigits:2});
  if(Math.abs(n)>=10000) return n.toLocaleString('en-IN',{maximumFractionDigits:0});
  if(Math.abs(n)>=100) return n.toLocaleString('en-IN',{maximumFractionDigits:1});
  return n.toFixed(2);
}

function getBeat(){return parseFloat(document.getElementById('beatThr').value)||2;}
function getMiss(){return parseFloat(document.getElementById('missThr').value)||2;}

function calcDev(estBase,actual,mu){
  if(mu==='%'){const a=parseFloat(actual),e=parseFloat(estBase);if(isNaN(a)||isNaN(e))return null;return a-e;}
  const aBase=toBaseMn(actual,mu),eBase=parseFloat(estBase);
  if(isNaN(aBase)||isNaN(eBase)||eBase===0)return null;
  return((aBase-eBase)/Math.abs(eBase))*100;
}

function getBadge(dev,mu){
  if(dev===null)return '<span class="na">—</span>';
  const beat=getBeat(),miss=getMiss();
  const thr=mu==='%'?beat/10:beat,mth=mu==='%'?miss/10:miss;
  if(dev>thr)return '<span class="badge beat">Beat</span>';
  if(dev<-mth)return '<span class="badge miss">Miss</span>';
  return '<span class="badge inline-b">In-line</span>';
}

function getDevColor(dev,mu){
  if(dev===null)return 'inherit';
  const beat=getBeat(),miss=getMiss();
  const thr=mu==='%'?beat/10:beat,mth=mu==='%'?miss/10:miss;
  if(dev>thr)return '#1D9E75';
  if(dev<-mth)return '#D85A30';
  return '#BA7517';
}

function render(){
  const allRows=[...currentMetrics,...customRows];
  renderCards(allRows);
  renderTable(allRows);
}

function renderCards(allRows){
  const wrap=document.getElementById('cardsWrap');
  if(!allRows.length){wrap.innerHTML='<div style="padding:40px;text-align:center;color:var(--color-text-secondary,#888);font-size:13px">No metrics loaded</div>';return;}
  wrap.innerHTML=allRows.map((row,i)=>{
    const actual=actuals[i]||'';
    const dev=actual!==''?calcDev(row.e,actual,row.u):null;
    const devStr=dev!==null?(dev>=0?'+':'')+dev.toFixed(2)+(row.u==='%'?' pp':'%'):'—';
    const devColor=getDevColor(dev,row.u);
    const badge=actual!==''?getBadge(dev,row.u):'<span class="na">—</span>';
    const ulbl=row.u==='spec'?(row.spec||''):getUnitLabel(row.u);
    const aiClass=aiFilled[i]?' ai-filled':'';
    return `<div class="metric-card">
      <div class="card-header">
        <span class="card-metric">${row.m}${ulbl?`<span class="card-unit">(${ulbl})</span>`:''}${aiFilled[i]?'<span class="card-ai">AI</span>':''}</span>
        ${badge}
      </div>
      <div class="card-body">
        <div class="card-field">
          <span class="card-label">Actual</span>
          <input class="actual-input${actual?' has-val':''}${aiClass}" id="cinp_${i}" type="number" inputmode="decimal" value="${actual}" placeholder="Enter" step="any"
            onchange="setActual(${i},this.value)">
        </div>
        <div class="card-field">
          <span class="card-label">Estimate (PL)</span>
          <span class="card-est">${fmtVal(row.e,row.u)}</span>
        </div>
      </div>
      <div class="card-footer">
        <span style="font-size:12px;color:var(--color-text-secondary,#666)">vs estimate</span>
        <span class="devpct" style="color:${devColor}">${devStr}</span>
      </div>
    </div>`;
  }).join('');
}

function renderTable(allRows){
  const tbody=document.getElementById('tableBody');
  if(!allRows.length){tbody.innerHTML='<tr><td colspan="5" style="padding:40px;text-align:center;color:var(--color-text-secondary,#888)">No metrics loaded</td></tr>';return;}
  tbody.innerHTML=allRows.map((row,i)=>{
    const actual=actuals[i]||'';
    const dev=actual!==''?calcDev(row.e,actual,row.u):null;
    const devStr=dev!==null?(dev>=0?'+':'')+dev.toFixed(2)+(row.u==='%'?' pp':'%'):'—';
    const devColor=getDevColor(dev,row.u);
    const badge=actual!==''?getBadge(dev,row.u):'<span class="na">—</span>';
    const ulbl=row.u==='spec'?(row.spec||''):getUnitLabel(row.u);
    const aiClass=aiFilled[i]?' ai-filled':'';
    return `<tr>
      <td><span class="tbl-metric">${row.m}</span>${ulbl?`<span style="font-size:11px;color:var(--color-text-secondary,#888);margin-left:4px">(${ulbl})</span>`:''}${aiFilled[i]?'<span style="font-size:10px;color:#534AB7;margin-left:4px">AI</span>':''}</td>
      <td><input class="tbl-input${actual?' has-val':''}${aiClass}" id="tinp_${i}" type="number" value="${actual}" placeholder="Enter" step="any"
        onchange="setActual(${i},this.value)"></td>
      <td class="tbl-est">${fmtVal(row.e,row.u)}</td>
      <td class="devpct" style="color:${devColor}">${devStr}</td>
      <td>${badge}</td>
    </tr>`;
  }).join('');
}

function setActual(idx,val){
  actuals[idx]=val;
  aiFilled[idx]=false;
  updateRowOnly(idx,val);
}

function updateRowOnly(idx,val){
  const allRows=[...currentMetrics,...customRows];
  const row=allRows[idx];
  if(!row) return;
  const dev=val!==''?calcDev(row.e,val,row.u):null;
  const devStr=dev!==null?(dev>=0?'+':'')+dev.toFixed(2)+(row.u==='%'?' pp':'%'):'—';
  const devColor=getDevColor(dev,row.u);
  const badge=val!==''?getBadge(dev,row.u):'<span class="na">—</span>';
  const hasVal=val!=='';
  const aiClass=aiFilled[idx]?' ai-filled':'';
  ['cinp_','tinp_'].forEach(pfx=>{
    const inp=document.getElementById(pfx+idx);
    if(!inp) return;
    inp.classList.toggle('has-val',hasVal);
    inp.classList.toggle('ai-filled',!!aiFilled[idx]);
    const card=inp.closest('.metric-card');
    if(card){
      const footer=card.querySelector('.card-footer .devpct');
      const badgeEl=card.querySelector('.card-header .badge,.card-header .na');
      if(footer){footer.textContent=devStr;footer.style.color=devColor;}
      if(badgeEl) badgeEl.outerHTML=badge;
      else card.querySelector('.card-header').insertAdjacentHTML('beforeend',badge);
    }
    const tr=inp.closest('tr');
    if(tr){
      tr.children[3].textContent=devStr;
      tr.children[3].style.color=devColor;
      tr.children[4].innerHTML=badge;
    }
  });
}

function recalcAll(){render();}

function addRow(){
  const name=prompt('Metric name:');if(!name)return;
  const uc=prompt('Unit:\n1 = ₹ Amount (follows Mn/Bn/Cr)\n2 = % or ratio\n3 = Custom label\nEnter 1,2 or 3:');
  let u='Mn',spec='';
  if(uc==='2')u='%';
  else if(uc==='3'){spec=prompt('Unit label:')||'';u='spec';}
  const ev=prompt('Estimate value:');if(ev===null)return;
  customRows.push({m:name,e:parseFloat(ev)||0,u,spec});
  render();
}

async function extractTextFromPDF(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let text='';
  for(let i=1;i<=Math.min(pdf.numPages,15);i++){
    const page=await pdf.getPage(i);
    const content=await page.getTextContent();
    text+=content.items.map(it=>it.str).join(' ')+'\n';
  }
  return text;
}

function buildPrompt(pdfText,company,metrics){
  const metricList=metrics.map((m,i)=>`${i}: "${m.m}" in ${m.u==='%'?'percentage (e.g. 3.54 for 3.54%)':m.u==='spec'?(m.spec||'original unit'):'₹ Millions (if doc uses Crores multiply by 10, if Billions multiply by 1000)'}`).join('\n');
  return `Extract Q4FY26 (January-March 2026) actual reported financials for ${company}.

Metrics (index: name, unit needed):
${metricList}

Rules — STRICTLY FOLLOW:
- Output ONLY raw JSON, zero other text.
- Keys = metric index as string, values = numbers.
- Omit any metric not clearly found.
- Q4FY26 actuals only — ignore FY25, Q3FY26, estimates.
- % metrics: output number directly (3.54 not 0.0354).
- Convert to ₹ Mn if doc uses Cr (×10) or Bn (×1000).

Example (do NOT use these values): {"0":344500,"1":296000,"4":3.56}

DOCUMENT TEXT:
${pdfText.substring(0,14000)}`;
}

async function handlePDF(input){
  const file=input.files[0];if(!file)return;
  setStatus('Reading PDF…','loading');
  dismissPreview();
  try{
    const text=await extractTextFromPDF(file);
    if(text.trim().length<100){setStatus('PDF appears image-based — no text found','err');return;}
    setStatus('Extracting with AI…','loading');
    const company=document.getElementById('companySel').value;
    const allRows=[...currentMetrics,...customRows];
    const prompt=buildPrompt(text,company,allRows);
    const headers={'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'};
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers,
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    if(!resp.ok){const t=await resp.text();setStatus('API error '+resp.status+': '+t.slice(0,100),'err');return;}
    const data=await resp.json();
    const raw=data.content?.[0]?.text||'{}';
    let extracted={};
    try{const m=raw.match(/\{[\s\S]*\}/);if(!m)throw new Error('no json');extracted=JSON.parse(m[0]);}
    catch(e){setStatus('Parse error: '+raw.slice(0,80),'err');return;}
    const keys=Object.keys(extracted);
    if(!keys.length){setStatus('No metrics found in PDF','err');return;}
    pendingExtracted=extracted;
    showPreview(extracted,allRows,file.name);
    setStatus(`Found ${keys.length} metric${keys.length>1?'s':''}  — review below`,'done');
  }catch(e){setStatus('Error: '+e.message,'err');}
  input.value='';
}

function showPreview(extracted,allRows,fname){
  const preview=document.getElementById('extPreview');
  const rows=document.getElementById('previewRows');
  preview.style.display='block';
  let html=`<div style="font-size:11px;color:var(--color-text-secondary,#666);margin-bottom:8px">From: <b>${fname}</b></div>`;
  Object.entries(extracted).forEach(([idx,val])=>{
    const row=allRows[parseInt(idx)];if(!row)return;
    const ulbl=row.u==='%'?'%':row.u==='spec'?(row.spec||''):'₹ Mn';
    html+=`<div class="ext-row">
      <span style="font-weight:500;font-size:13px">${row.m}</span>
      <span style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="color:var(--color-text-secondary,#666);font-size:12px">Est: ${fmtVal(row.e,row.u)}</span>
        <span style="font-weight:500;font-size:13px">${val} ${ulbl}</span>
        <span class="ext-match">✓</span>
      </span>
    </div>`;
  });
  rows.innerHTML=html;
}

function applyExtracted(){
  const allRows=[...currentMetrics,...customRows];
  Object.entries(pendingExtracted).forEach(([idx,val])=>{
    const i=parseInt(idx);
    if(allRows[i]){actuals[i]=val;aiFilled[i]=true;}
  });
  pendingExtracted={};
  dismissPreview();
  render();
  setStatus('Applied — purple border = AI-filled','done');
}

function dismissPreview(){
  document.getElementById('extPreview').style.display='none';
  document.getElementById('previewRows').innerHTML='';
  pendingExtracted={};
}

populateSectors();
</script>
